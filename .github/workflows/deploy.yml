name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build
      run: |
        cd ${{ github.workspace }}
        dotnet publish FabrikDashboard.csproj -c Release -o ./publish --ignore-failed-sources

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: app-fabrikdata
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
